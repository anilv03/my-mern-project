version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: zalnio-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
    networks:
      - zalnio-network

  app:
    build: .
    container_name: zalnio-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-password}@mongodb:27017/zalnio?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:5000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5000}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      AUTO_VERIFY_KYC: "true"
      RATE_LIMIT_MAX: 10000
    depends_on:
      - mongodb
    networks:
      - zalnio-network

  # Uncomment for nginx reverse proxy
  # nginx:
  #   image: nginx:alpine
  #   container_name: zalnio-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf
  #   depends_on:
  #     - app
  #   networks:
  #     - zalnio-network

volumes:
  mongo_data:

networks:
  zalnio-network:
    driver: bridge
